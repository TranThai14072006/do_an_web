<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | 36 Jewelry</title>
<link rel="stylesheet" href="../jewelry-cart.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header-container">
  <div class="search-bar">
    <div class="left">
      <a href="../index_profile.html" class="home-btn">
        <i class="fas fa-home"></i> Home
      </a>
    </div>

    <div class="center">
      <a href="../index.html">
        <img src="../../images/36-logo.png" class="header-logo">
      </a>

      <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button onclick="window.location.href='search.html'">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <div class="right">
      <a href="Jewelry-cart.html" class="icon-link">
        <i class="fas fa-shopping-cart"></i>
      </a>
      <a href="profile.html" class="icon-link">
        <i class="fas fa-user"></i>
      </a>
    </div>
  </div>
</header>

<main class="main-content">
  <button class="back-button" onclick="window.history.back()">←</button>

  <h2>Your Shopping Cart</h2>

  <!-- ALERT -->
  <div id="alert-message" class="alert-message"></div>

  <table class="cart-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>

    <!-- 🔥 QUAN TRỌNG: tbody rỗng -->
    <tbody id="cart-body"></tbody>

  </table>

  <div class="cart-summary">
    <p class="total">Total: <strong id="cart-total">$0.00</strong></p>
    <a href="order_confirm.html" class="checkout-btn">Proceed to Checkout</a>
  </div>
</main>

<footer class="footer">
  <p>&copy; 2025 36 Jewelry. All rights reserved.</p>
</footer>

<script>

// ===== LOAD CART =====
async function loadCart() {
  try {
    const res = await fetch('jewelry_cart.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get' })
    });

    const data = await res.json();
    const tbody = document.getElementById('cart-body');
    tbody.innerHTML = '';

    if (data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center;padding:40px;font-size:20px;">
            Your cart is empty.
          </td>
        </tr>`;
      return;
    }

    data.forEach(item => {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td class="product-info">
          <img src="../../images/${item.image}" class="product-thumb">
          <span>${item.name}</span>
        </td>

        <td class="price">$${Number(item.price).toFixed(2)}</td>

        <td class="quantity-cell">
          <input type="number" value="${item.quantity}" min="1"
                 class="quantity-input" data-id="${item.id}">
        </td>

        <td class="item-total">$0.00</td>

        <td class="action-cell">
          <button class="view-details-btn"
            onclick="viewProduct('${item.id}')">
            View
          </button>

          <button class="remove-btn"
            onclick="removeItem('${item.id}', this)">
            Remove
          </button>
        </td>
      `;

      tbody.appendChild(tr);
    });

    attachEvents();
    updateTotals();

  } catch (err) {
    document.getElementById('cart-body').innerHTML =
      `<tr><td colspan="5" style="text-align:center;color:red;">
        Error loading cart
      </td></tr>`;
  }
}

// ===== UPDATE TOTAL =====
function updateTotals() {
  let total = 0;

  document.querySelectorAll('#cart-body tr').forEach(row => {
    const price = parseFloat(row.querySelector('.price').textContent.replace('$',''));
    const qty = parseInt(row.querySelector('.quantity-input').value);

    const itemTotal = price * qty;
    row.querySelector('.item-total').textContent = '$' + itemTotal.toFixed(2);

    total += itemTotal;
  });

  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
}

// ===== UPDATE QUANTITY =====
function attachEvents() {
  document.querySelectorAll('.quantity-input').forEach(input => {
    input.addEventListener('change', async () => {

      await fetch('jewelry_cart.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'update',
          product_id: input.dataset.id,
          quantity: input.value
        })
      });

      updateTotals();
    });
  });
}

// ===== REMOVE =====
async function removeItem(id, btn) {

  await fetch('jewelry_cart.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'remove',
      product_id: id
    })
  });

  btn.closest('tr').remove();
  updateTotals();
  showAlert('🟢 Item removed!');
}

// ===== VIEW =====
function viewProduct(id) {
  window.location.href = '../Products/product-detail.php?id=' + id;
}

// ===== ALERT =====
function showAlert(message) {
  const alertBox = document.getElementById('alert-message');
  alertBox.textContent = message;
  alertBox.style.opacity = '1';

  setTimeout(() => {
    alertBox.style.opacity = '0';
  }, 2000);
}

// INIT
loadCart();

</script>

</body>
</html>
