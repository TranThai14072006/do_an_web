<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | 36 Jewelry</title>
<link rel="stylesheet" href="../jewelry-cart.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header-container">
  <div class="search-bar">
    <div class="left">
      <a href="../indexprofile.php" class="home-btn">
        <i class="fas fa-home"></i> Home
      </a>
    </div>

    <div class="center">
      <a href="../indexprofile.php">
        <img src="../../images/36-logo.png" class="header-logo">
      </a>

      <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button onclick="window.location.href='search.html'">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <div class="right">
      <a href="Jewelry-cart.html" class="icon-link">
        <i class="fas fa-shopping-cart"></i>
      </a>
      <a href="../users/profile.php" class="icon-link">
        <i class="fas fa-user"></i>
      </a>
    </div>
  </div>
</header>

<main class="main-content">
  <button class="back-button" onclick="window.history.back()">←</button>

  <h2>Your Shopping Cart</h2>

  <!-- ALERT -->
  <div id="alert-message" class="alert-message"></div>

  <table class="cart-table">
    <thead>
      <tr>
        <th>Product</th>
        <th>Size</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="cart-body"></tbody>
  </table>

  <div class="cart-summary">
    <p class="total">Total: <strong id="cart-total">$0.00</strong></p>
    <a href="../users/order_confirm.php" class="checkout-btn">Proceed to Checkout</a>
  </div>
</main>

<footer class="footer">
  <p>&copy; 2025 36 Jewelry. All rights reserved.</p>
</footer>

<script>

// ===== LOAD CART =====
async function loadCart() {
  try {
    const res = await fetch('jewelry_cart.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get' })
    });

    const data = await res.json();
    const tbody = document.getElementById('cart-body');
    tbody.innerHTML = '';

    if (data.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="text-align:center;padding:40px;font-size:20px;">
            Your cart is empty.
          </td>
        </tr>`;
      return;
    }

    data.forEach(item => {
      const tr = document.createElement('tr');

      // Hiển thị size — nếu không có thì ghi dấu gạch
      const sizeDisplay = item.size ? item.size : '—';

      tr.innerHTML = `
        <td class="product-info">
          <img src="../../images/${item.image}" class="product-thumb">
          <span>${item.name}</span>
        </td>

        <td class="size-cell">${sizeDisplay}</td>

        <td class="price">$${Number(item.price).toFixed(2)}</td>

        <td class="quantity-cell">
          <input type="number" value="${item.quantity}" min="1"
                 class="quantity-input"
                 data-id="${item.id}"
                 data-size="${item.size ?? ''}">
        </td>

        <td class="item-total">$0.00</td>

        <td class="action-cell">
          <button class="view-details-btn"
            onclick="viewProduct('${item.id}', '${item.size ?? ''}')">
            View
          </button>

          <button class="remove-btn"
            onclick="removeItem('${item.id}', '${item.size ?? ''}', this)">
            Remove
          </button>
        </td>
      `;

      tbody.appendChild(tr);
    });

    attachEvents();
    updateTotals();

  } catch (err) {
    document.getElementById('cart-body').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:red;">
        Error loading cart
      </td></tr>`;
  }
}

// ===== UPDATE TOTAL =====
function updateTotals() {
  let total = 0;

  document.querySelectorAll('#cart-body tr').forEach(row => {
    const priceEl  = row.querySelector('.price');
    const qtyEl    = row.querySelector('.quantity-input');
    const totalEl  = row.querySelector('.item-total');

    if (!priceEl || !qtyEl || !totalEl) return;

    const price    = parseFloat(priceEl.textContent.replace('$', ''));
    const qty      = parseInt(qtyEl.value);
    const itemTotal = price * qty;

    totalEl.textContent = '$' + itemTotal.toFixed(2);
    total += itemTotal;
  });

  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
}

// ===== UPDATE QUANTITY =====
// Truyền thêm data-size để backend update đúng dòng (product_id + size)
function attachEvents() {
  document.querySelectorAll('.quantity-input').forEach(input => {
    input.addEventListener('change', async () => {

      await fetch('jewelry_cart.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action:     'update',
          product_id: input.dataset.id,
          size:       input.dataset.size,   // <-- FIX: gửi size
          quantity:   input.value
        })
      });

      updateTotals();
    });
  });
}

// ===== REMOVE =====
// Truyền thêm size để backend xoá đúng dòng (product_id + size)
async function removeItem(id, size, btn) {

  await fetch('jewelry_cart.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action:     'remove',
      product_id: id,
      size:       size    // <-- FIX: gửi size
    })
  });

  btn.closest('tr').remove();
  updateTotals();
  showAlert('🟢 Item removed!');
}

// ===== VIEW =====
function viewProduct(id, size) {
  window.location.href = '../Cart/view.php?id=' + id + '&size=' + encodeURIComponent(size);
}

// ===== ALERT =====
function showAlert(message) {
  const alertBox = document.getElementById('alert-message');
  alertBox.textContent = message;
  alertBox.style.opacity = '1';

  setTimeout(() => {
    alertBox.style.opacity = '0';
  }, 2000);
}

// INIT
loadCart();

</script>

</body>
</html>
