<div class="cart-notification" id="cart-notification">
  <div class="notification-content">
    <div class="notification-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="notification-text">
      <h3>Added to cart!</h3>
      <p>The product has been added to your shopping cart.</p>
    </div>
    <button class="close-notification" onclick="closeNotification()">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>

<script>
const ITEMS_PER_PAGE = 8;
let allProducts = [];
let currentPage = 1;
let currentGender = 'all';

async function loadProducts(gender) {
  try {
    const url = gender === 'all' ? 'products.php' : `products.php?gender=${gender}`;
    const res = await fetch(url);
    allProducts = await res.json();
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
  } catch (err) {
    console.error('Error loading products:', err);
  }
}

function renderPage(page) {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';

  const start = (page - 1) * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  const pageProducts = allProducts.slice(start, end);

  pageProducts.forEach(product => {
    const card = document.createElement('article');
    card.className = 'product-card';
    card.innerHTML = `
      <a href="product-detail.php?id=${product.id}" class="product-card-link">
        <div class="image-holder">
          <img src="../../images/${product.image}" alt="${product.name}" class="product-image">
        </div>
        <h3 class="product-title">${product.name}</h3>
        <span class="product-price">$${Number(product.sale_price).toFixed(2)}</span>
      </a>
      <button class="btn-add" data-id="${product.id}" data-name="${product.name}">Add to Cart</button>
    `;
    grid.appendChild(card);
  });
  document.querySelectorAll('.btn-add').forEach(btn => {
  btn.addEventListener('click', function () {
    addToCart(this.dataset.id, this.dataset.name, this);
  });
});
}

function renderPagination() {
  const totalPages = Math.ceil(allProducts.length / ITEMS_PER_PAGE);
  const pagination = document.getElementById('pagination');
  pagination.innerHTML = '';

  // Nút <
  const prev = document.createElement('a');
  prev.href = '#';
  prev.textContent = '<';
  if (currentPage === 1) prev.classList.add('disabled');
  prev.addEventListener('click', function(e) {
    e.preventDefault();
    if (currentPage > 1) {
      currentPage--;
      renderPage(currentPage);
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });
  pagination.appendChild(prev);

  // Số trang
  for (let i = 1; i <= totalPages; i++) {
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = i;
    if (i === currentPage) a.classList.add('active');
    a.addEventListener('click', function(e) {
      e.preventDefault();
      currentPage = i;
      renderPage(currentPage);
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    pagination.appendChild(a);
  }

  // Nút >
  const next = document.createElement('a');
  next.href = '#';
  next.textContent = '>';
  if (currentPage === totalPages || totalPages === 0) next.classList.add('disabled');
  next.addEventListener('click', function(e) {
    e.preventDefault();
    if (currentPage < totalPages) {
      currentPage++;
      renderPage(currentPage);
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });
  pagination.appendChild(next);
}

// Xử lý click tab filter
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentGender = this.dataset.gender;
    loadProducts(currentGender);
  });
});

// Load lần đầu
loadProducts('all');
</script>

<script>
function showNotification(productName) {
  const notification = document.getElementById('cart-notification');
  const textEl = notification.querySelector('.notification-text h3');
  textEl.textContent = `"${productName}" added to cart!`;
  notification.classList.add('show');
  clearTimeout(notification.timeout);
  notification.timeout = setTimeout(() => {
    notification.classList.remove('show');
  }, 3000);
}

function closeNotification() {
  const notification = document.getElementById('cart-notification');
  notification.classList.remove('show');
  clearTimeout(notification.timeout);
}
async function addToCart(productId, productName, btn) {
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    const res = await fetch('add_to_cart.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_id: productId, quantity: 1 }),
    });

    const data = await res.json();

    if (data.success) {
      showNotification(productName);
    } else {
      alert(data.message || 'Failed to add to cart');
    }
  } catch (err) {
    alert('Network error, please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to Cart';
  }
}
</script>
